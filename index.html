<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripFactory ORN — Product & Supply Org</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f8fafc;color:#1e293b;font-family:'Inter',sans-serif;overflow:hidden}

/* HEADER */
.hdr{background:#fff;border-bottom:2px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hdr-logo{font-size:16px;font-weight:700;color:#0f172a;letter-spacing:-.4px}
.hdr-logo span{color:#C9A84C}
.hdr-sub{font-size:11px;color:#94a3b8;font-family:'JetBrains Mono',monospace;font-weight:400}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;border:1.5px solid}
.pill-red{color:#dc2626;border-color:#fca5a5;background:#fef2f2}
.pill-gold{color:#b45309;border-color:#fcd34d;background:#fffbeb}
.pill-teal{color:#0f766e;border-color:#99f6e4;background:#f0fdfa}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#475569;cursor:pointer;transition:.15s}
.tb-btn:hover{border-color:#cbd5e1;background:#fff;color:#1e293b}
.tb-sep{width:1px;height:18px;background:#e2e8f0}
.legend{display:flex;align-items:center;gap:14px;margin-left:auto}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:#64748b;font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* SEARCH */
.search-wrap{position:relative}
.search-wrap input{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:7px;color:#1e293b;font-size:12px;padding:5px 10px 5px 28px;width:180px;outline:none;font-family:'Inter',sans-serif;transition:.15s}
.search-wrap input:focus{border-color:#0f766e;background:#fff;width:220px}
.search-wrap::before{content:'⌕';position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;pointer-events:none}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}

/* TREE PANEL */
.tree-panel{flex:1;overflow-y:auto;overflow-x:auto;padding:20px 24px 60px;min-width:0;background:#f8fafc}
.tree-panel::-webkit-scrollbar{width:5px;height:5px}
.tree-panel::-webkit-scrollbar-track{background:#f1f5f9}
.tree-panel::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.tree-panel::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* DETAIL PANEL */
.detail{width:320px;flex-shrink:0;border-left:1.5px solid #e2e8f0;background:#fff;overflow-y:auto;transition:width .25s;display:flex;flex-direction:column;box-shadow:-2px 0 8px rgba(0,0,0,.04)}
.detail.hidden{width:0;border-left:none;overflow:hidden}
.detail-hd{padding:18px 20px 12px;border-bottom:1px solid #f1f5f9;flex-shrink:0}
.detail-hd h2{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:3px;line-height:1.3}
.detail-hd p{font-size:11px;color:#64748b}
.detail-body{padding:16px 20px;flex:1}
.d-section{margin-bottom:18px}
.d-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;font-family:'JetBrains Mono',monospace;margin-bottom:7px}

/* slot rows */
.slot-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f1f5f9}
.slot-row:last-child{border-bottom:none}
.slot-num{font-size:10px;color:#94a3b8;width:18px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-weight:500}
.slot-info{flex:1;min-width:0}
.slot-name{font-size:12px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-role{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.slot-empty{font-size:11px;color:#cbd5e1;font-style:italic}
.slot-assign{font-size:10px;padding:3px 10px;border-radius:5px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;transition:.1s;font-family:'Inter',sans-serif;font-weight:500}
.slot-assign:hover{border-color:#0f766e;color:#0f766e;background:#f0fdfa}
.slot-rm{width:18px;height:18px;border-radius:50%;border:none;background:#fef2f2;color:#dc2626;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.1s;font-weight:700}
.slot-rm:hover{background:#fee2e2}

/* TREE NODES */
.tree-root{padding-left:0}
.tree-node{position:relative}
.tree-children{padding-left:24px;overflow:hidden;max-height:0;transition:max-height .3s ease}
.tree-children.open{max-height:99999px}
.tree-children{position:relative}
.tree-children::before{content:'';position:absolute;left:9px;top:0;bottom:14px;width:1.5px;background:#e2e8f0}

.node-row{position:relative;display:flex;align-items:center;gap:0;margin-bottom:3px}
.tree-node:not(.root-node) > .node-row::before{content:'';position:absolute;left:-15px;top:50%;width:15px;height:1.5px;background:#e2e8f0}

.node-toggle{width:22px;height:22px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:10px;transition:.15s;border-radius:4px;margin-right:3px}
.node-toggle:hover{color:#475569;background:#f1f5f9}
.node-toggle.leaf{opacity:0;pointer-events:none}

.node-chip{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 8px;border-radius:8px;cursor:pointer;transition:.15s;border:1.5px solid transparent;max-width:480px;min-width:0}
.node-chip:hover{background:#fff;border-color:#e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.node-chip.active{background:#fff;border-color:#0f766e;box-shadow:0 1px 4px rgba(15,118,110,.15)}

.chip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.chip-label{font-size:13px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-sub{font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:2px;flex-shrink:0}
.chip-count{font-size:10px;font-family:'JetBrains Mono',monospace;color:#cbd5e1;margin-left:auto;flex-shrink:0;padding-left:8px;font-weight:500}
.chip-filled{font-size:10px;font-family:'JetBrains Mono',monospace;color:#0f766e;margin-left:auto;flex-shrink:0;padding-left:8px;font-weight:600}

/* city leaf nodes — slightly smaller, indented look */
.node-chip.city-chip{padding:4px 8px 4px 6px}
.node-chip.city-chip .chip-label{font-size:12px;font-weight:500;color:#475569}
.node-chip.city-chip .chip-sub{font-size:10px}
.chip-dot.city-dot{width:6px;height:6px;background:#cbd5e1!important}

/* type colours */
.c-cpso{background:#b45309}
.c-dir {background:#475569}
.c-mice{background:#dc2626}
.c-git {background:#0891b2}
.c-pm  {background:#0f766e}
.c-dmc {background:#7c3aed}
.c-city{background:#cbd5e1}
.c-conn{background:#1d4ed8}
.c-sup {background:#d97706}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;width:400px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.15)}
.modal-hd{padding:14px 16px 10px;border-bottom:1px solid #f1f5f9}
.modal-hd h3{font-size:14px;font-weight:700;color:#0f172a}
.modal-hd p{font-size:10px;color:#64748b;margin-top:2px}
.modal-filters{padding:10px 12px;border-bottom:1px solid #f1f5f9;display:flex;gap:8px}
.modal-filters input,.modal-filters select{flex:1;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:6px;color:#1e293b;font-size:11px;padding:5px 8px;outline:none;font-family:'Inter',sans-serif}
.modal-filters input:focus,.modal-filters select:focus{border-color:#0f766e;background:#fff}
.modal-list{overflow-y:auto;flex:1;padding:6px 10px}
.modal-item{padding:8px 10px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.1s}
.modal-item:hover{background:#f0fdfa}
.m-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.m-name{font-size:12px;font-weight:600;color:#0f172a}
.m-sub{font-size:10px;color:#64748b;margin-top:1px}
.modal-ft{padding:10px 14px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.modal-ft span{font-size:10px;color:#94a3b8;font-family:'JetBrains Mono',monospace}
.modal-ft button{font-size:11px;padding:4px 12px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#475569;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
.modal-ft button:hover{border-color:#cbd5e1;color:#1e293b}

#fill-count{font-size:10px;color:#64748b;font-family:'JetBrains Mono',monospace;font-weight:500}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100%">

<div class="hdr">
  <div class="hdr-logo">TripFactory <span>ORN</span></div>
  <div class="hdr-sub">Product &amp; Supply · Org Chart</div>
  <div class="hdr-right">
    <span class="pill pill-red">MICE &amp; GIT</span>
    <span class="pill pill-gold">Product &amp; Supply</span>
    <span class="pill pill-teal">Connectivity</span>
    <button onclick="saveAlloc()" style="font-size:11px;padding:5px 12px;border-radius:6px;border:1.5px solid #fcd34d;background:#fffbeb;color:#b45309;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600">💾 Save</button>
  </div>
</div>

<div class="toolbar">
  <button class="tb-btn" onclick="expandAll()">▾ Expand All</button>
  <button class="tb-btn" onclick="collapseAll()">▸ Collapse All</button>
  <div class="tb-sep"></div>
  <div class="search-wrap"><input id="search" placeholder="Search roles, DMCs, cities…" oninput="doSearch(this.value)"></div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#dc2626"></div>MICE/GIT</div>
    <div class="leg"><div class="leg-dot" style="background:#0f766e"></div>Dest. Mgr</div>
    <div class="leg"><div class="leg-dot" style="background:#7c3aed"></div>DMC/Dest</div>
    <div class="leg"><div class="leg-dot" style="background:#94a3b8"></div>Cities</div>
    <div class="leg"><div class="leg-dot" style="background:#1d4ed8"></div>Connectivity</div>
  </div>
  <span id="fill-count"></span>
</div>

<div class="main">
  <div class="tree-panel" id="tree-panel"></div>
  <div class="detail hidden" id="detail">
    <div class="detail-hd">
      <h2 id="d-title">—</h2>
      <p id="d-sub">Select a node to view details</p>
    </div>
    <div class="detail-body" id="d-body"></div>
  </div>
</div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="m-title">Assign Person</h3>
      <p id="m-sub">Slot 1</p>
    </div>
    <div class="modal-filters">
      <input id="m-q" placeholder="Search name, title…" oninput="mSearch()">
      <select id="m-dept" onchange="mSearch()">
        <option value="">All depts</option>
        <option>Sales</option><option>Product</option><option>Operations</option>
        <option>Technology</option><option>Finance</option><option>HR &amp; Admin</option><option>Leadership</option>
      </select>
    </div>
    <div class="modal-list" id="m-list"></div>
    <div class="modal-ft">
      <span id="m-count"></span>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
var alloc={};
try{var _s=localStorage.getItem('tf_org_v2');if(_s)alloc=JSON.parse(_s);}catch(e){}
var expanded={cpso:true};
var activeNode=null, activeRoleId=null, activeSlot=null;

function flatNodes(n,a){a=a||[];a.push(n);(n.children||[]).forEach(function(c){flatNodes(c,a);});return a;}
var ALL_NODES=flatNodes(TREE);
function findNode(id){return ALL_NODES.find(function(n){return n.id===id;});}
function avCls(d){var m={Leadership:'#1e3a5f',Product:'#0f766e',Sales:'#166534',Operations:'#92400e',Technology:'#3730a3',Finance:'#6b21a8','HR & Admin':'#9f1239'};return m[d]||'#475569';}
function ini(n){return(n||'').split(' ').slice(0,2).map(function(w){return w[0]||''}).join('').toUpperCase();}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTree(q){
  var panel=document.getElementById('tree-panel');
  panel.innerHTML='';
  var root=document.createElement('div');
  root.className='tree-root';
  renderNode(TREE,root,true,q||'');
  panel.appendChild(root);
  updateFillCount();
}

function nodeMatches(n,q){
  if(!q)return true;
  return (n.label+' '+(n.sub||'')+' '+(n.jd||[]).join(' ')).toLowerCase().indexOf(q.toLowerCase())!==-1;
}
function anyMatch(n,q){
  if(nodeMatches(n,q))return true;
  return (n.children||[]).some(function(c){return anyMatch(c,q);});
}

function renderNode(node,container,isRoot,q){
  if(q&&!anyMatch(node,q))return;
  var wrap=document.createElement('div');
  wrap.className='tree-node'+(isRoot?' root-node':'');
  wrap.dataset.id=node.id;

  var row=document.createElement('div');row.className='node-row';

  var hasKids=node.children&&node.children.length>0;
  var tog=document.createElement('div');
  tog.className='node-toggle'+(hasKids?'':' leaf');
  if(hasKids){
    tog.textContent=expanded[node.id]?'▾':'▸';
    tog.onclick=function(e){e.stopPropagation();toggleNode(node.id);};
  }

  var chip=document.createElement('div');
  var isCity=node.type==='city';
  chip.className='node-chip'+(isCity?' city-chip':'')+(activeNode===node.id?' active':'');
  chip.onclick=function(){selectNode(node.id);};

  var dot=document.createElement('div');
  dot.className='chip-dot'+(isCity?' city-dot':' c-'+node.type);
  if(!isCity)dot.classList.add('c-'+node.type);

  var lbl=document.createElement('span');
  lbl.className='chip-label';
  lbl.textContent=node.label;
  if(q&&nodeMatches(node,q)&&!isCity)lbl.style.color='#b45309';

  var sub=document.createElement('span');
  sub.className='chip-sub';
  sub.textContent=node.sub||'';

  chip.appendChild(dot);chip.appendChild(lbl);chip.appendChild(sub);

  if(node.slots){
    var ppl=(alloc[node.id]||[]).filter(Boolean);
    var cnt=document.createElement('span');
    cnt.className=ppl.length>0?'chip-filled':'chip-count';
    cnt.textContent=ppl.length+'/'+node.slots;
    chip.appendChild(cnt);
  }

  row.appendChild(tog);row.appendChild(chip);
  wrap.appendChild(row);

  if(hasKids){
    var ch=document.createElement('div');
    ch.className='tree-children'+(expanded[node.id]||q?' open':'');
    ch.dataset.parent=node.id;
    node.children.forEach(function(c){renderNode(c,ch,false,q);});
    wrap.appendChild(ch);
  }
  container.appendChild(wrap);
}

function toggleNode(id){
  expanded[id]=!expanded[id];
  var wrap=document.querySelector('.tree-node[data-id="'+id+'"]');
  if(wrap){
    var tog=wrap.querySelector('.node-toggle');
    var ch=wrap.querySelector('.tree-children');
    if(tog)tog.textContent=expanded[id]?'▾':'▸';
    if(ch){if(expanded[id])ch.classList.add('open');else ch.classList.remove('open');}
  }
}

function selectNode(id){
  activeNode=id;
  document.querySelectorAll('.node-chip').forEach(function(c){c.classList.remove('active');});
  var wrap=document.querySelector('.tree-node[data-id="'+id+'"]');
  if(wrap){var chip=wrap.querySelector('.node-chip');if(chip)chip.classList.add('active');}
  showDetail(id);
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function showDetail(id){
  var node=findNode(id);if(!node)return;
  var det=document.getElementById('detail');det.classList.remove('hidden');
  document.getElementById('d-title').textContent=node.label;
  document.getElementById('d-sub').textContent=node.sub||'';
  var body=document.getElementById('d-body');body.innerHTML='';

  if(node.jd&&node.jd.length){
    var s=document.createElement('div');s.className='d-section';
    var l=document.createElement('div');l.className='d-label';l.textContent='Key Responsibilities';s.appendChild(l);
    node.jd.forEach(function(j){
      var p=document.createElement('p');
      p.style.cssText='font-size:11px;color:#475569;margin-bottom:6px;padding-left:10px;border-left:2px solid #e2e8f0;line-height:1.5';
      p.textContent=j;s.appendChild(p);
    });
    body.appendChild(s);
  }

  if(node.type==='city'){
    var cs=document.createElement('div');cs.className='d-section';
    var cl=document.createElement('div');cl.className='d-label';cl.textContent='Key Attractions & Areas';cs.appendChild(cl);
    var cp=document.createElement('p');cp.style.cssText='font-size:12px;color:#1e293b;line-height:1.6';cp.textContent=node.sub;cs.appendChild(cp);
    body.appendChild(cs);
    return;
  }

  if(node.slots){
    var ss=document.createElement('div');ss.className='d-section';
    var sl=document.createElement('div');sl.className='d-label';sl.textContent='People ('+node.slots+' slots)';
    // use a closure to avoid issues
    buildSlots(ss, node);
    body.appendChild(ss);
  }
}

function buildSlots(container, node){
  var dl=document.createElement('div');dl.className='d-label';dl.textContent='People ('+node.slots+' slots)';
  container.appendChild(dl);
  var ppl=(alloc[node.id]||[]).filter(Boolean);
  for(var i=0;i<Math.max(node.slots,ppl.length);i++){
    var sr=document.createElement('div');sr.className='slot-row';
    var sn=document.createElement('div');sn.className='slot-num';sn.textContent=String(i+1);sr.appendChild(sn);
    if(ppl[i]){
      var si=document.createElement('div');si.className='slot-info';
      var snm=document.createElement('div');snm.className='slot-name';snm.textContent=ppl[i].n;
      var str=document.createElement('div');str.className='slot-role';str.textContent=(ppl[i].t||'')+(ppl[i].l?' · '+ppl[i].l:'');
      si.appendChild(snm);si.appendChild(str);
      var rm=document.createElement('button');rm.className='slot-rm';rm.textContent='×';
      (function(rid,idx){rm.onclick=function(){rmv(rid,idx);};})(node.id,i);
      sr.appendChild(si);sr.appendChild(rm);
    }else{
      var se=document.createElement('div');se.className='slot-info';
      var sem=document.createElement('div');sem.className='slot-empty';sem.textContent='Vacant';se.appendChild(sem);
      var sa=document.createElement('button');sa.className='slot-assign';sa.textContent='+ Assign';
      (function(rid,idx){sa.onclick=function(){openModal(rid,idx);};})(node.id,i);
      sr.appendChild(se);sr.appendChild(sa);
    }
    container.appendChild(sr);
  }
  var add=document.createElement('button');
  add.style.cssText='font-size:10px;padding:4px 10px;margin-top:8px;border:1.5px dashed #e2e8f0;background:#f8fafc;color:#94a3b8;border-radius:5px;cursor:pointer;font-family:Inter,sans-serif;transition:.1s';
  add.textContent='+ Add slot';
  add.onmouseover=function(){this.style.borderColor='#0f766e';this.style.color='#0f766e';};
  add.onmouseout=function(){this.style.borderColor='#e2e8f0';this.style.color='#94a3b8';};
  (function(rid){add.onclick=function(){openModal(rid,(alloc[rid]||[]).length);};})(node.id);
  container.appendChild(add);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(rid,idx){
  activeRoleId=rid;activeSlot=idx;
  var node=findNode(rid);
  document.getElementById('m-title').textContent='Assign: '+(node?node.label:'');
  document.getElementById('m-sub').textContent='Slot '+(idx+1);
  document.getElementById('m-q').value='';
  document.getElementById('m-dept').value='';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('m-q').focus();
  mSearch();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');activeRoleId=null;activeSlot=null;}

function mSearch(){
  var q=(document.getElementById('m-q').value||'').toLowerCase();
  var dept=document.getElementById('m-dept').value;
  var used={};
  Object.keys(alloc).forEach(function(k){(alloc[k]||[]).filter(Boolean).forEach(function(p){used[p.n]=true;});});
  var res=STAFF.filter(function(s){
    if(used[s.n])return false;
    if(dept&&s.d!==dept)return false;
    if(!q)return true;
    return[s.n,s.t,s.d,s.l].some(function(v){return v&&v.toLowerCase().indexOf(q)!==-1;});
  }).slice(0,60);
  var list=document.getElementById('m-list');list.innerHTML='';
  res.forEach(function(s){
    var it=document.createElement('div');it.className='modal-item';
    var av=document.createElement('div');av.className='m-av';av.style.background=avCls(s.d);av.textContent=ini(s.n);
    var info=document.createElement('div');
    var nm=document.createElement('div');nm.className='m-name';nm.textContent=s.n;
    var sb=document.createElement('div');sb.className='m-sub';sb.textContent=(s.t||'')+(s.l?' · '+s.l:'');
    info.appendChild(nm);info.appendChild(sb);
    it.appendChild(av);it.appendChild(info);
    (function(st){it.onclick=function(){assignPerson(st);};})(s);
    list.appendChild(it);
  });
  document.getElementById('m-count').textContent=res.length+(res.length===60?' (refine search)':'');
}

function assignPerson(s){
  if(!activeRoleId)return;
  if(!alloc[activeRoleId])alloc[activeRoleId]=[];
  while(alloc[activeRoleId].length<=activeSlot)alloc[activeRoleId].push(null);
  alloc[activeRoleId][activeSlot]=s;
  closeModal();showDetail(activeRoleId);updateFillCount();
  refreshChip(activeRoleId);
}
function rmv(rid,idx){
  if(alloc[rid])alloc[rid].splice(idx,1);
  showDetail(rid);updateFillCount();refreshChip(rid);
}
function refreshChip(rid){
  var wrap=document.querySelector('.tree-node[data-id="'+rid+'"]');
  if(!wrap)return;
  var cnt=wrap.querySelector('.chip-count,.chip-filled');
  if(!cnt)return;
  var node=findNode(rid);
  var ppl=(alloc[rid]||[]).filter(Boolean);
  cnt.textContent=ppl.length+'/'+node.slots;
  cnt.className=ppl.length>0?'chip-filled':'chip-count';
}

function expandAll(){ALL_NODES.forEach(function(n){if(n.children&&n.children.length)expanded[n.id]=true;});renderTree();}
function collapseAll(){ALL_NODES.forEach(function(n){expanded[n.id]=false;});expanded['cpso']=true;renderTree();document.getElementById('detail').classList.add('hidden');activeNode=null;}

var st;
function doSearch(q){clearTimeout(st);st=setTimeout(function(){renderTree(q.trim());},180);}

function saveAlloc(){
  try{localStorage.setItem('tf_org_v2',JSON.stringify(alloc));}catch(e){}
  var b=event.currentTarget;b.textContent='✓ Saved';
  setTimeout(function(){b.textContent='💾 Save';},1600);
}
function updateFillCount(){
  var f=0,t=0;
  ALL_NODES.forEach(function(n){if(n.slots){t+=n.slots;f+=(alloc[n.id]||[]).filter(Boolean).length;}});
  document.getElementById('fill-count').textContent=f+'/'+t+' filled';
}

renderTree();
</script>
</body>
</html>
